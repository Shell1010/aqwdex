name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Runs every time you push to main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Download and install Trunk
        run: |
          wget -qO- https://github.com/trunk-rs/trunk/releases/latest/download/trunk-x86_64-unknown-linux-gnu.tar.gz | tar -xzf-
          mv trunk /usr/local/bin/

      - name: Build with Trunk
        # IMPORTANT: Replace 'aqwdex' with your repo name if it's different
        # This ensures links work on subfolders like shell1010.github.io/aqwdeex/
        working-directory: ./main
        run: trunk build --release --public-url /aqwdex/

      - name: Configure Git
        run: |
          git config --global user.name "shell1010"
          git config --global user.email "amin.dev03@gmail.com"

      - name: Manual Git Push to AQWHub
        env:
            # Use the secret you already created
            API_TOKEN: ${{ secrets.AUTO_UPDATE_TOKEN }}
        run: |
            # 1. Setup Identity
            git config --global user.email "YOUR_GITHUB_EMAIL@example.com"
            git config --global user.name "shell1010"
        
            # 2. Clone the destination repo into a temp folder
            git clone https://x-access-token:${API_TOKEN}@github.com/shell1010/aqwhub.git destination
            
            # 3. Copy build files to the destination
            mkdir -p destination/src/site/aqwdex
            rm -rf destination/src/site/aqwdex/*
            cp -r main/dist/* destination/src/site/aqwdex/
            
            # 4. Commit and Push from the destination folder
            cd destination
            git add .
            # Only commit if there are changes to avoid erroring out
            git diff-index --quiet HEAD || git commit -m "Automated AQWDex Update"
            git push origin main

      - name: Success Notification
        run: echo "AQWDex successfully synced to aqwhub.com/aqwdex"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./main/dist # The folder Trunk creates
          branch: gh-pages # The branch where the site lives