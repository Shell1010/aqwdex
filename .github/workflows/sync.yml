name: Build and Sync to AQWHub

on:
  push:
    branches: [ "main" ] # Runs every time you push to main
  workflow_dispatch:     # Allows you to run it manually from the Actions tab

jobs:
  build-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout AQWDex
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Trunk
        run: |
          wget -qO- https://github.com/trunk-rs/trunk/releases/latest/download/trunk-x86_64-unknown-linux-gnu.tar.gz | tar -xzf-
          sudo mv trunk /usr/local/bin/

      - name: Build Project
        # We build with --release for performance and smaller WASM size
        working-directory: ./main
        run: trunk build --release --public-url /aqwdex/

      - name: Configure Git
        run: |
          git config --global user.name "shell1010"
          git config --global user.email "amin.dev03@gmail.com"

      - name: Push to AQWHub Repository
        uses: cpina/github-action-push-to-another-repository@main
        env:
          # This uses the secret you created in Step 3
          API_TOKEN_GITHUB: ${{ secrets.AUTO_UPDATE_TOKEN }}
        with:
          # The 'dist' folder created by Trunk
          source-directory: './main/dist'
          destination-github-username: 'shell1010'
          destination-repository-name: 'aqw_guide'
          # This ensures the files land in the Digital Garden's static site folder
          target-directory: 'src/site/aqwdex'
          target-branch: main

      - name: Success Notification
        run: echo "AQWDex successfully synced to aqwhub.com/aqwdex"